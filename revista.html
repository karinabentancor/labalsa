<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revista – LA BALSA</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="revista-page">

    <video autoplay muted loop playsinline class="video-fondo">
        <source src="media/video1.mp4" type="video/mp4">
    </video>

    <div id="menu-global"></div>

    <!-- Wrapper que pone título a la izquierda y portada a la derecha en desktop -->
    <div class="revista-hero">

        <div class="revista-header">
            <h1>La Balsa<br><em>Revista</em></h1>
        </div>

        <div class="revista-grid">
            <a href="media/revistas/labalsa01.pdf" target="_blank" class="tomo-card">
                <div class="tomo-img-wrap">
                    <img src="media/revistas/portadaN1.jpg" alt="Revista La Balsa N°1">
                </div>
                <div class="tomo-footer">
                    <span class="tomo-leer">Ver edición</span>
                </div>
            </a>
        </div>

    </div>

    <div class="suscripcion-seccion">
        <div class="suscripcion-inner suscripcion-solo-texto">
            <div class="suscripcion-texto">
                <!-- "Revista física ·" eliminado, solo queda "Envío a todo el país" -->
                <p class="suscripcion-eyebrow">Envío a todo el país</p>
                <h2 class="suscripcion-titulo">Remá con nosotros</h2>
                <p class="suscripcion-bajada">Recibí La Balsa en tu casa cada edición. Una revista para leer despacio, como se navega.</p>
                <div class="suscripcion-precios">
                    <div class="precio-item">
                        <span class="precio-label">Por número</span>
                        <span class="precio-valor">$$$$</span>
                    </div>
                    <div class="precio-divider"></div>
                    <div class="precio-item">
                        <span class="precio-label">Suscripción anual</span>
                        <span class="precio-valor">$$$$</span>
                    </div>
                </div>
                <button class="btn-suscribirse btn-abrir-modal" id="btnAbrirModal">Quiero suscribirme</button>
            </div>
        </div>

        <div class="publicidad-seccion">
            <p class="publicidad-texto">¿Querés publicitar en la revista?</p>
            <a href="https://wa.me/5980000" target="_blank" class="btn-wsp">Comunicate por WhatsApp</a>
        </div>
    </div>

    <div class="modal-overlay" id="modalSuscripcion" role="dialog" aria-modal="true" aria-labelledby="modalTitulo">
        <div class="modal-caja">
            <button class="modal-cerrar" id="modalCerrar" aria-label="Cerrar">✕</button>
            <div class="modal-encabezado">
                <h3 class="modal-titulo" id="modalTitulo">Suscripción<br><em>La Balsa Revista</em></h3>
            </div>
            <form class="suscripcion-form modal-form" onsubmit="return false;">
                <div class="form-field">
                    <label for="sub-nombre">Nombre</label>
                    <input type="text" id="sub-nombre" placeholder="Tu nombre">
                </div>
                <div class="form-field">
                    <label>Tipo de suscripción</label>
                    <div class="radio-group">
                        <label class="radio-opcion">
                            <input type="radio" name="sub-tipo" value="numero" checked>
                            <span class="radio-label">Por número</span>
                        </label>
                        <label class="radio-opcion">
                            <input type="radio" name="sub-tipo" value="anual">
                            <span class="radio-label">Suscripción anual</span>
                        </label>
                    </div>
                </div>
                <div class="form-field">
                    <label for="sub-email">Correo electrónico</label>
                    <input type="email" id="sub-email" placeholder="tu@correo.com">
                </div>
                <div class="form-field">
                    <label for="sub-cel">Celular</label>
                    <input type="tel" id="sub-cel" placeholder="+598 09X XXX XXX">
                </div>
                <div class="form-field">
                    <label for="sub-direccion">Dirección de envío</label>
                    <textarea id="sub-direccion" rows="3" placeholder="Calle, número, ciudad, departamento"></textarea>
                </div>
                <button type="submit" class="btn-suscribirse btn-modal-submit">Confirmar suscripción</button>
            </form>
        </div>
    </div>

   <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="script.js"></script>
</body>
</html>
